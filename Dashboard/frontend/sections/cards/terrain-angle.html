<div class="card panel-surface terrain-compact">
  <div class="card-title teal">Terrain Angle</div>
  <svg class="terrain-horiz-svg" viewBox="0 0 280 215" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="horizonClip">
        <circle cx="140" cy="112" r="66"/>
      </clipPath>
      <linearGradient id="taSkyGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#0e2440"/>
        <stop offset="100%" stop-color="#1b4a6a"/>
      </linearGradient>
      <linearGradient id="taGroundGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#3d1800"/>
        <stop offset="100%" stop-color="#5e2d00"/>
      </linearGradient>
    </defs>

    <!-- ROLL ARC (center 140,112 radius 95, spans ±30° from top) -->
    <path d="M92.5,29.7 A95,95 0 0,1 187.5,29.7" fill="none" stroke="#181f18" stroke-width="8" stroke-linecap="round"/>
    <!-- Red zones ±20°–±30° -->
    <path d="M92.5,29.7 A95,95 0 0,1 107.5,22.7"  fill="none" stroke="#6b1010" stroke-width="7" stroke-linecap="round"/>
    <path d="M172.5,22.7 A95,95 0 0,1 187.5,29.7" fill="none" stroke="#6b1010" stroke-width="7" stroke-linecap="round"/>
    <!-- Amber zones ±10°–±20° -->
    <path d="M107.5,22.7 A95,95 0 0,1 123.5,18.4" fill="none" stroke="#9a6000" stroke-width="7" stroke-linecap="round"/>
    <path d="M156.5,18.4 A95,95 0 0,1 172.5,22.7" fill="none" stroke="#9a6000" stroke-width="7" stroke-linecap="round"/>
    <!-- Green zone ±10° center -->
    <path d="M123.5,18.4 A95,95 0 0,1 156.5,18.4" fill="none" stroke="#196a20" stroke-width="7" stroke-linecap="round"/>

    <!-- Tick marks on roll arc -->
    <line x1="140"   y1="17"   x2="140"   y2="23"   stroke="#ddd" stroke-width="2"/>
    <line x1="123.5" y1="18.4" x2="124.5" y2="24.3" stroke="#bbb" stroke-width="1.5"/>
    <line x1="156.5" y1="18.4" x2="155.5" y2="24.3" stroke="#bbb" stroke-width="1.5"/>
    <line x1="107.5" y1="22.7" x2="109.6" y2="28.3" stroke="#aaa" stroke-width="1.5"/>
    <line x1="172.5" y1="22.7" x2="170.4" y2="28.3" stroke="#aaa" stroke-width="1.5"/>
    <!-- Labels -->
    <text x="90"  y="42" fill="#555" font-size="7.5" text-anchor="middle" font-family="monospace">-20°</text>
    <text x="190" y="42" fill="#555" font-size="7.5" text-anchor="middle" font-family="monospace">+20°</text>
    <text x="140" y="13" fill="#888" font-size="7"   text-anchor="middle" font-family="monospace">0</text>

    <!-- Roll pointer (rotates around circle center 140,112) -->
    <g id="terrain-roll-ptr" transform="rotate(0, 140, 112)">
      <polygon points="140,16 136,27 144,27" fill="#3dd6e0" opacity="0.9"/>
    </g>

    <!-- ARTIFICIAL HORIZON -->
    <circle cx="140" cy="112" r="70" fill="#080f0d"/>
    <g clip-path="url(#horizonClip)">
      <g transform="translate(140, 112)">
        <g id="terrain-horiz-rot" transform="rotate(0)">
          <g id="terrain-horiz-pitch" transform="translate(0, 0)">
            <rect x="-200" y="-200" width="400" height="200" fill="url(#taSkyGrad)"/>
            <rect x="-200" y="0"    width="400" height="200" fill="url(#taGroundGrad)"/>
            <line x1="-200" y1="0" x2="200" y2="0" stroke="#5aba6a" stroke-width="1.5"/>
            <!-- Pitch ±5° lines (1° = 3px) -->
            <line x1="-40" y1="-15" x2="40" y2="-15" stroke="#4488aa" stroke-width="1"   opacity="0.7"/>
            <line x1="-40" y1=" 15" x2="40" y2=" 15" stroke="#aa7040" stroke-width="1"   opacity="0.7"/>
            <line x1="-25" y1="-30" x2="25" y2="-30" stroke="#4488aa" stroke-width="0.8" opacity="0.5"/>
            <line x1="-25" y1=" 30" x2="25" y2=" 30" stroke="#aa7040" stroke-width="0.8" opacity="0.5"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Circle border ring -->
    <circle cx="140" cy="112" r="66" fill="none" stroke="#2a4a38" stroke-width="3"/>

    <!-- Fixed crosshair (golden, always centered) -->
    <line x1="95"  y1="112" x2="122" y2="112" stroke="#f0c030" stroke-width="2.5"/>
    <line x1="158" y1="112" x2="185" y2="112" stroke="#f0c030" stroke-width="2.5"/>
    <circle cx="140" cy="112" r="3.5" fill="#f0c030"/>
    <circle cx="140" cy="112" r="8"   fill="none" stroke="#f0c030" stroke-width="1.5"/>

    <!-- Pitch scale ticks (right side, fixed) 5°=15px, 10°=30px -->
    <line x1="207" y1="97"  x2="215" y2="97"  stroke="#4488aa" stroke-width="1.2"/>
    <line x1="207" y1="127" x2="215" y2="127" stroke="#aa7040" stroke-width="1.2"/>
    <line x1="207" y1="82"  x2="212" y2="82"  stroke="#4488aa" stroke-width="0.9" opacity="0.7"/>
    <line x1="207" y1="142" x2="212" y2="142" stroke="#aa7040" stroke-width="0.9" opacity="0.7"/>
    <text x="217" y="100"  fill="#4488aa" font-size="6.5" font-family="monospace">▲ 5°</text>
    <text x="217" y="130"  fill="#aa7040" font-size="6.5" font-family="monospace">▼ 5°</text>

    <!-- Divider -->
    <line x1="20" y1="188" x2="260" y2="188" stroke="#243830" stroke-width="1"/>

    <!-- Readouts -->
    <text x="70"  y="200" fill="#556066" font-size="8" text-anchor="middle" font-family="monospace">▲ PITCH</text>
    <text id="angle-pitch" x="70"  y="213" fill="#3dd6e0" font-size="13" font-weight="bold" text-anchor="middle" font-family="monospace">+0.0°</text>
    <line x1="140" y1="190" x2="140" y2="215" stroke="#243830" stroke-width="1"/>
    <text x="210" y="200" fill="#556066" font-size="8" text-anchor="middle" font-family="monospace">◄ ROLL ►</text>
    <text id="angle-roll"  x="210" y="213" fill="#3dd6e0" font-size="13" font-weight="bold" text-anchor="middle" font-family="monospace">+0.0°</text>
  </svg>
</div>
