<div class="card panel-surface">
  <div class="card-title lime">Dynamometer <span id="dyno-vehicle-name">—</span></div>

  <!-- Leyenda -->
  <div class="dyno-legend">
    <span class="dyno-leg-item"><span class="dyno-leg-dot dyno-leg-dot--amber"></span>Par Máx</span>
    <span class="dyno-leg-item"><span class="dyno-leg-dot dyno-leg-dot--teal"></span>Par Aplicado</span>
    <span class="dyno-leg-item" id="dyno-mr-legend"><span class="dyno-leg-dot dyno-leg-dot--mr"></span>Zona Potencia MR</span>
  </div>

  <div class="chart-container dyno-container dyno-chart">
    <svg id="dyno-svg" class="sparkline" viewBox="0 0 280 160" preserveAspectRatio="none">
      <defs>
        <!-- Relleno bajo curva máx (par disponible) -->
        <linearGradient id="dynoMaxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="rgba(255,170,0,0.30)"/>
          <stop offset="100%" stop-color="rgba(255,170,0,0.02)"/>
        </linearGradient>
        <!-- Relleno bajo curva aplicada -->
        <linearGradient id="dynoAppGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="rgba(0,229,204,0.18)"/>
          <stop offset="100%" stop-color="rgba(0,229,204,0.01)"/>
        </linearGradient>
        <!-- Barra de carga izquierda: verde → ámbar según altura -->
        <linearGradient id="dynoLoadGrad" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%"   stop-color="rgba(168,255,62,0.90)"/>
          <stop offset="55%"  stop-color="rgba(168,255,62,0.55)"/>
          <stop offset="100%" stop-color="rgba(255,170,0,0.75)"/>
        </linearGradient>
        <!-- Gradiente zona de potencia MR (franja verde semitransparente) -->
        <linearGradient id="dynoPowerBandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="rgba(168,255,62,0.18)"/>
          <stop offset="100%" stop-color="rgba(168,255,62,0.06)"/>
        </linearGradient>
        <!-- Glow para las curvas -->
        <filter id="dynoGlow" x="-10%" y="-20%" width="120%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Franja zona de potencia MR (oculta si no hay datos MR) -->
      <rect id="dyno-power-band" x="0" y="0" width="0" height="160"
            fill="url(#dynoPowerBandGrad)" opacity="0"/>
      <!-- Línea RPM eco MR (inicio zona torque óptimo) -->
      <line id="dyno-eco-line" x1="0" y1="0" x2="0" y2="160"
            stroke="rgba(168,255,62,0.45)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>
      <!-- Línea RPM pico potencia MR -->
      <line id="dyno-peak-line" x1="0" y1="0" x2="0" y2="160"
            stroke="rgba(255,170,0,0.55)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>

      <!-- Grid horizontal sutil -->
      <g class="chart-grid">
        <line x1="0" y1="40"  x2="280" y2="40"/>
        <line x1="0" y1="80"  x2="280" y2="80"/>
        <line x1="0" y1="120" x2="280" y2="120"/>
      </g>

      <!-- Áreas de relleno bajo cada curva -->
      <path id="dyno-max-area" fill="url(#dynoMaxGrad)" d=""/>
      <path id="dyno-app-area" fill="url(#dynoAppGrad)" d=""/>

      <!-- Curva ámbar: par MÁXIMO disponible (referencia del motor) -->
      <path id="dyno-torque-path" class="dyno-line-max" fill="none" d="" filter="url(#dynoGlow)"/>

      <!-- Curva teal: par APLICADO promedio histórico -->
      <path id="dyno-applied-path" class="dyno-line-applied" fill="none" d="" filter="url(#dynoGlow)"/>

      <!-- Línea vertical en RPM actual -->
      <line id="dyno-rpm-line" x1="0" y1="2" x2="0" y2="156"
            stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="2,3" opacity="0"/>

      <!-- Barra de carga: columna delgada en borde izquierdo, verde → ámbar -->
      <rect id="dyno-load-bar" x="2" y="160" width="6" height="0" rx="3"
            fill="url(#dynoLoadGrad)"/>

      <!-- Punto vivo en la intersección RPM–Par actual -->
      <circle id="dyno-live-dot" cx="0" cy="160" r="4.5" fill="var(--amber)" opacity="0" class="dyno-live-dot-glow"/>
    </svg>

    <!-- Etiquetas eje RPM: fuera del SVG para no distorsionarse -->
    <div class="dyno-rpm-axis">
      <span id="dyno-rpm-min-label" class="dyno-rpm-lbl">— rpm</span>
      <span id="dyno-rpm-max-label" class="dyno-rpm-lbl">— rpm</span>
    </div>
  </div>

  <div class="chart-meta">
    <div class="chart-stat">PAR APLIC <span class="cs-amber" id="dyno-torque-val">0</span><small> Nm</small></div>
    <div class="chart-stat">PAR MÁX <span class="cs-yellow" id="dyno-max-val">0</span><small> Nm</small></div>
    <div class="chart-stat">CARGA <span class="cs-lime" id="dyno-load-val">0%</span></div>
    <div class="chart-stat">RPM <span class="cs-teal" id="dyno-rpm-val">0</span></div>
  </div>
</div>
