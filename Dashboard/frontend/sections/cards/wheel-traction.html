<div class="card panel-surface wheel-traction-card">
  <div class="card-title-row">
    <span class="card-title teal">Tracción Ruedas</span>
    <span class="drive-type-badge" id="drive-type-badge">4WD</span>
  </div>

  <!-- Front Left -->
  <div class="wt-wheel-row" id="wheel-cell-FL">
    <div class="wt-pos-col">
      <span class="wt-pos-label">FL</span>
      <span class="wheel-contact-dot" id="wheel-contact-FL"></span>
    </div>
    <div class="wt-bars-col">
      <div class="wt-bar-row">
        <span class="wt-bar-lbl">TRQ</span>
        <div class="wt-bar-track"><div class="wheel-torque-bar" id="wheel-bar-FL"></div></div>
        <span class="wt-bar-val" id="wheel-torq-FL">0</span><span class="wt-unit">%</span>
      </div>
      <div class="wt-bar-row">
        <span class="wt-bar-lbl">SLP</span>
        <div class="wt-bar-track"><div class="wheel-slip-fill" id="wheel-slip-FL"></div></div>
        <span class="wt-bar-val" id="wheel-slipval-FL">0%</span>
      </div>
      <div class="wt-bar-row wt-hidden" id="wheel-latrow-FL">
        <span class="wt-bar-lbl lat-lbl">LAT</span>
        <div class="wt-bar-track"><div class="wheel-slip-fill wheel-latslip-fill" id="wheel-latslip-FL"></div></div>
        <span class="wt-bar-val" id="wheel-latval-FL">0%</span>
      </div>
    </div>
    <div class="wt-meta-col">
      <div class="wheel-ground-badge wt-hidden" id="wheel-ground-FL">ROAD</div>
      <div class="wt-load-wrap">
        <span class="wheel-load-val wt-hidden" id="wheel-load-FL"></span>
        <span class="wheel-load-unit wt-hidden" id="wheel-loadunit-FL">kN</span>
      </div>
    </div>
  </div>

  <!-- Front Right -->
  <div class="wt-wheel-row" id="wheel-cell-FR">
    <div class="wt-pos-col">
      <span class="wt-pos-label">FR</span>
      <span class="wheel-contact-dot" id="wheel-contact-FR"></span>
    </div>

      <div class="wt-bar-row">
        <span class="wt-bar-lbl">TRQ</span>
        <div class="wt-bar-track"><div class="wheel-torque-bar" id="wheel-bar-FR"></div></div>
        <span class="wt-bar-val" id="wheel-torq-FR">0</span><span class="wt-unit">%</span>
      </div>
      <div class="wt-bar-row">
        <span class="wt-bar-lbl">SLP</span>

        <span class="wt-bar-val" id="wheel-slipval-FR">0%</span>
      </div>
      <div class="wt-bar-row wt-hidden" id="wheel-latrow-FR">

        <span class="wt-bar-val" id="wheel-latval-FR">0%</span>
      </div>
    </div>
    <div class="wt-meta-col">
      <div class="wheel-ground-badge wt-hidden" id="wheel-ground-FR">ROAD</div>
      <div class="wt-load-wrap">
        <span class="wheel-load-val wt-hidden" id="wheel-load-FR"></span>
        <span class="wheel-load-unit wt-hidden" id="wheel-loadunit-FR">kN</span>
      </div>
    </div>
  </div>

  <!-- Rear Left -->
  <div class="wt-wheel-row" id="wheel-cell-RL">
    <div class="wt-pos-col">

        <span class="wt-bar-val" id="wheel-slipval-RL">0%</span>
      </div>
      <div class="wt-bar-row wt-hidden" id="wheel-latrow-RL">

  </div>

      <span class="wheel-contact-dot" id="wheel-contact-RR"></span>

    <div class="wt-bars-col">
      <div class="wt-bar-row">
        <span class="wt-bar-lbl">TRQ</span>
        <div class="wt-bar-track"><div class="wheel-torque-bar" id="wheel-bar-RR"></div></div>
        <span class="wt-bar-val" id="wheel-torq-RR">0</span><span class="wt-unit">%</span>
      </div>
      <div class="wt-bar-row">
        <span class="wt-bar-lbl">SLP</span>
        <div class="wt-bar-track"><div class="wheel-slip-fill" id="wheel-slip-RR"></div></div>
        <span class="wt-bar-val" id="wheel-slipval-RR">0%</span>
      </div>
      <div class="wt-bar-row wt-hidden" id="wheel-latrow-RR">

    <div class="wt-meta-col">
