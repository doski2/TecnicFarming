<div class="card gauge-card panel-surface">

  <!-- ══════════════ DUAL GAUGE ROW ══════════════ -->
  <div class="dual-gauge-row">

    <!-- ── IZQUIERDA: VELOCIDAD ─────────────────── -->
    <div class="gauge-half">
      <div class="gauge-half-label">Velocidad</div>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#006b5e"/>
              <stop offset="65%"  stop-color="#00e5cc"/>
              <stop offset="100%" stop-color="#ffaa00"/>
            </linearGradient>
            <filter id="glowS" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Anillo decorativo -->
          <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(0,229,204,0.03)" stroke-width="1"/>

          <!-- Arco de fondo (240°) -->
          <path d="M 35 232 A 144 144 0 1 1 285 232"
            fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="13" stroke-linecap="round"/>

          <!-- Arco coloreado velocidad: teal → ámbar (0–60 km/h) -->
          <path d="M 35 232 A 144 144 0 1 1 285 232"
            fill="none" stroke="url(#speedGrad)" stroke-width="13" stroke-linecap="round"
            filter="url(#glowS)"/>

          <!-- Marcas mayores (7 marcas @ 40° cada una: 0,10,20,30,40,50,60) -->
          <g stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-linecap="round">
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-210 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-170 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-130 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-90 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-50 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-10 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate( 30 160 160)"/>
          </g>

          <!-- Marcas menores (6 puntos medios @ 20° entre mayores) -->
          <g stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round">
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-190 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-150 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-110 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-70 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-30 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate( 10 160 160)"/>
          </g>

          <!-- Números de velocidad (km/h) — posiciones calculadas geométricamente
               igualando radios del RPM gauge de referencia (~143 px desde centro) -->
          <g font-family="Roboto Mono,monospace" font-size="10" font-weight="600" text-anchor="middle">
            <text x="39"  y="244" fill="rgba(255,255,255,0.60)">0</text>
            <text x="26"  y="142" fill="rgba(255,255,255,0.60)">10</text>
            <text x="73"  y="56"  fill="rgba(255,255,255,0.60)">20</text>
            <text x="160" y="12"  fill="rgba(255,255,255,0.60)">30</text>
            <text x="247" y="56"  fill="var(--amber)">40</text>
            <text x="294" y="142" fill="var(--amber)">50</text>
            <text x="281" y="244" fill="var(--amber)">60</text>
            <text x="160" y="324" fill="rgba(255,255,255,0.15)" font-size="7">km/h</text>
          </g>

          <!-- Línea de aviso 40 km/h (ángulo = -210 + (40/60)*240 = -50°) -->
          <g transform="rotate(-50 160 160)">
            <line x1="160" y1="160" x2="160" y2="26"
              stroke="var(--amber)" stroke-width="1.5" stroke-linecap="round"
              stroke-dasharray="3,2" filter="url(#glowS)" opacity="0.70"/>
          </g>

          <!-- Anillo central decorativo -->
          <circle cx="160" cy="160" r="68" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5" stroke-dasharray="4 6"/>

          <!-- Aguja de velocidad -->
          <g id="speed-needle-group" transform="rotate(-210 160 160)" filter="url(#glowS)">
            <line x1="160" y1="160" x2="160" y2="44"
              stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </g>

          <!-- Hub central -->
          <circle cx="160" cy="160" r="10" fill="rgba(10,13,17,0.96)" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
          <circle cx="160" cy="160" r="5" fill="var(--teal)" class="gauge-hub-dot-spd"/>
        </svg>

        <div class="gauge-display">
          <div class="gauge-rpm" id="speed-display">0</div>
          <div class="gauge-rpm-label gauge-rpm-label-speed">km/h</div>
        </div>
      </div>
    </div>

    <!-- ── DERECHA: RPM MOTOR ───────────────────── -->
    <div class="gauge-half">
      <div class="gauge-half-label">Motor RPM</div>
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 320 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#3a7e0c"/>
              <stop offset="70%"  stop-color="#a8ff3e"/>
              <stop offset="100%" stop-color="#ffaa00"/>
            </linearGradient>
            <linearGradient id="powerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#2a5a06"/>
              <stop offset="100%" stop-color="#a8ff3e"/>
            </linearGradient>
            <filter id="glowF" x="-30%" y="-30%" width="160%" height="160%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Anillos decorativos -->
          <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(168,255,62,0.03)" stroke-width="1"/>
          <circle cx="160" cy="160" r="145" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>

          <!-- Arco de fondo (240°) -->
          <path d="M 35 232 A 144 144 0 1 1 285 232"
            fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="13" stroke-linecap="round"/>

          <!-- Arco RPM: lime → ámbar -->
          <path d="M 35 232 A 144 144 0 1 1 285 232"
            fill="none" stroke="url(#limeGrad)" stroke-width="13" stroke-linecap="round"
            filter="url(#glowF)"/>

          <!-- Marcas mayores (9 @ 30°: 0–8×1000) -->
          <g stroke="rgba(255,255,255,0.30)" stroke-width="2" stroke-linecap="round">
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-210 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-180 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-150 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-120 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-90 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-60 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(-30 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate(  0 160 160)"/>
            <line x1="160" y1="19" x2="160" y2="33" transform="rotate( 30 160 160)"/>
          </g>

          <!-- Marcas menores -->
          <g stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round">
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-195 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-165 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-135 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-105 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-75 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-45 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate(-15 160 160)"/>
            <line x1="160" y1="22" x2="160" y2="31" transform="rotate( 15 160 160)"/>
          </g>

          <!-- Números RPM (0–8 ×1000) -->
          <g font-family="Roboto Mono,monospace" font-size="10" font-weight="600" text-anchor="middle">
            <text x="39"  y="244" fill="rgba(255,255,255,0.60)">0</text>
            <text x="20"  y="168" fill="rgba(255,255,255,0.60)">1</text>
            <text x="39"  y="90"  fill="rgba(255,255,255,0.60)">2</text>
            <text x="90"  y="39"  fill="rgba(255,255,255,0.60)">3</text>
            <text x="160" y="12"  fill="rgba(255,255,255,0.60)">4</text>
            <text x="230" y="39"  fill="rgba(255,255,255,0.60)">5</text>
            <text x="281" y="90"  fill="var(--amber)">6</text>
            <text x="300" y="168" fill="var(--amber)">7</text>
            <text x="281" y="244" fill="var(--amber)">8</text>
            <text x="160" y="324" fill="rgba(255,255,255,0.15)" font-size="7">×1000</text>
          </g>

          <!-- Arco de carga interior -->
          <path d="M 51 257 A 109 109 0 1 1 269 257"
            fill="none" stroke="url(#powerGrad)" stroke-width="6.5" stroke-linecap="round"
            class="power-arc" filter="url(#glowF)"/>
          <path d="M 51 257 A 109 109 0 1 1 269 257"
            fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="6.5" stroke-linecap="round"/>

          <!-- Anillo central decorativo -->
          <circle cx="160" cy="160" r="68" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5" stroke-dasharray="4 6"/>

          <!-- Línea zona ECO (~1500 RPM → -165°) -->
          <g id="eco-line-group" transform="rotate(-165 160 160)">
            <line x1="160" y1="160" x2="160" y2="26"
              stroke="var(--lime)" stroke-width="2" stroke-linecap="round"
              stroke-dasharray="3,2" filter="url(#glowF)" opacity="0.9"/>
            <text transform="translate(160,160) rotate(-165) translate(0,-140)"
              fill="var(--lime)" font-size="7" font-family="Roboto Mono,monospace"
              font-weight="700" opacity="0.95" text-anchor="middle" dominant-baseline="middle">ECO</text>
          </g>

          <!-- Línea zona OPTIMAL (~2300 RPM → -141°) -->
          <g id="opt-line-group" transform="rotate(-141 160 160)">
            <line x1="160" y1="160" x2="160" y2="26"
              stroke="var(--teal)" stroke-width="2" stroke-linecap="round"
              stroke-dasharray="3,2" filter="url(#glowF)" opacity="0.9"/>
            <text transform="translate(160,160) rotate(-141) translate(0,-140)"
              fill="var(--teal)" font-size="7" font-family="Roboto Mono,monospace"
              font-weight="700" opacity="0.95" text-anchor="middle" dominant-baseline="middle">OPT</text>
          </g>

          <!-- Aguja RPM -->
          <g id="needle-group" transform="rotate(-210 160 160)" filter="url(#glowF)">
            <line x1="160" y1="160" x2="160" y2="44"
              stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </g>

          <!-- Hub central -->
          <circle cx="160" cy="160" r="10" fill="rgba(10,13,17,0.96)" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
          <circle cx="160" cy="160" r="5" fill="var(--lime)" class="gauge-hub-dot"/>
        </svg>

        <div class="gauge-display">
          <div class="gauge-rpm" id="rpm-display">0</div>
          <div class="gauge-rpm-label">RPM</div>
        </div>
      </div>
    </div>

  </div><!-- /dual-gauge-row -->

  <!-- ── TIRA DE ESTADO DEL MOTOR ──────────────── -->
  <div class="center-strip">
    <div class="strip-cell">
      <div class="strip-val sv-lime" id="status-load">0<span class="strip-unit">%</span></div>
      <div class="strip-lbl">Engine Load</div>
    </div>
    <div class="strip-cell">
      <div class="strip-val sv-amber" id="status-gear">N</div>
      <div class="strip-lbl">Gear · Drive</div>
    </div>
    <div class="strip-cell">
      <div class="strip-val sv-teal" id="status-temp">0<span class="strip-unit">°</span></div>
      <div class="strip-lbl">Temp °C</div>
    </div>
  </div>

  <!-- ── ZONAS RPM ──────────────────────────────── -->
  <div class="zones-display">
    <div class="zone-indicator eco"><div>ECO</div><div id="zone-eco" class="eco-value">1500</div></div>
    <div class="zone-indicator opt"><div>OPTIMAL</div><div id="zone-opt" class="opt-value">2300</div></div>
  </div>

  <div class="gear-advice-row">
    <span id="gear-advice" class="gear-advice-badge neutral">—</span>
  </div>

</div>
